<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" role="img" aria-labelledby="t d"><title id="t">权益投资观察仪表盘</title><desc id="d">房地产、信用、价格、盈利和资金五个确认指标</desc><rect width="1200" height="500" rx="24" fill="#fafafa"/><g font-family="system-ui,-apple-system,'Noto Sans SC',sans-serif"><text x="58" y="54" font-size="24" font-weight="750">把“日本化”叙事变成可跟踪的五个确认指标</text><text x="58" y="82" font-size="14" fill="#777">研究流程：宏观先验 → 行业验证 → 公司现金流 → 估值与仓位</text><g transform="translate(58 130)"><g><rect width="202" height="275" rx="16" fill="#fff" stroke="#e2e2e2"/><circle cx="101" cy="75" r="48" fill="#f0dede"/><text x="101" y="84" text-anchor="middle" font-size="28" font-weight="750" fill="#a44f4f">1</text><text x="24" y="155" font-size="16" font-weight="700">地产</text><text x="24" y="184" font-size="13" fill="#777">销售/库存/交付</text><text x="24" y="225" font-size="13">确认信号：量价止跌</text><text x="24" y="250" font-size="13" fill="#a44f4f">否则：地产链β</text></g><g transform="translate(220)"><rect width="202" height="275" rx="16" fill="#fff" stroke="#e2e2e2"/><circle cx="101" cy="75" r="48" fill="#f7eee0"/><text x="101" y="84" text-anchor="middle" font-size="28" font-weight="750" fill="#c89456">2</text><text x="24" y="155" font-size="16" font-weight="700">信用</text><text x="24" y="184" font-size="13" fill="#777">NPL/LGFV/资本</text><text x="24" y="225" font-size="13">确认信号：损失透明</text><text x="24" y="250" font-size="13" fill="#c89456">否则：低估值陷阱</text></g><g transform="translate(440)"><rect width="202" height="275" rx="16" fill="#fff" stroke="#e2e2e2"/><circle cx="101" cy="75" r="48" fill="#e8f0f5"/><text x="101" y="84" text-anchor="middle" font-size="28" font-weight="750" fill="#597d9c">3</text><text x="24" y="155" font-size="16" font-weight="700">价格</text><text x="24" y="184" font-size="13" fill="#777">核心 CPI/平减指数</text><text x="24" y="225" font-size="13">确认信号：名义增长</text><text x="24" y="250" font-size="13" fill="#597d9c">否则：盈利下修</text></g><g transform="translate(660)"><rect width="202" height="275" rx="16" fill="#fff" stroke="#e2e2e2"/><circle cx="101" cy="75" r="48" fill="#edf3f1"/><text x="101" y="84" text-anchor="middle" font-size="28" font-weight="750" fill="#4d6b61">4</text><text x="24" y="155" font-size="16" font-weight="700">盈利</text><text x="24" y="184" font-size="13" fill="#777">毛利/ROIC/分红</text><text x="24" y="225" font-size="13">确认信号：现金流兑现</text><text x="24" y="250" font-size="13" fill="#4d6b61">否则：主题估值</text></g><g transform="translate(880)"><rect width="202" height="275" rx="16" fill="#fff" stroke="#e2e2e2"/><circle cx="101" cy="75" r="48" fill="#ece8f3"/><text x="101" y="84" text-anchor="middle" font-size="28" font-weight="750" fill="#75699b">5</text><text x="24" y="155" font-size="16" font-weight="700">资金</text><text x="24" y="184" font-size="13" fill="#777">南向/外资/回购</text><text x="24" y="225" font-size="13">确认信号：持续流入</text><text x="24" y="250" font-size="13" fill="#75699b">否则：反弹脆弱</text></g></g></g></svg>
