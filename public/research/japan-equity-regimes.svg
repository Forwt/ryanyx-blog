<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="t d"><title id="t">日本泡沫后权益市场的三个阶段</title><desc id="d">日经与TOPIX下跌以及银行、地产、出口制造、内需服务的相对路径</desc><rect width="1200" height="620" rx="24" fill="#fafafa"/><g font-family="system-ui,-apple-system,'Noto Sans SC',sans-serif"><text x="58" y="55" font-size="24" font-weight="750">日本泡沫后：不是“全市场一起跌”，而是行业权重重排</text><text x="58" y="83" font-size="14" fill="#777">示意指数：1989=100；用来识别阶段与相对路径，不作为可交易回测</text><g transform="translate(62 120)"><rect width="625" height="386" rx="16" fill="#fff" stroke="#e2e2e2"/><line x1="65" y1="325" x2="585" y2="325" stroke="#ddd"/><line x1="65" y1="80" x2="65" y2="325" stroke="#ddd"/><g fill="#aaa" font-size="12"><text x="42" y="327">0</text><text x="35" y="206">50</text><text x="29" y="84">100</text><text x="80" y="349">1989</text><text x="245" y="349">1995</text><text x="405" y="349">2003</text><text x="530" y="349">2012</text></g><polyline points="80,80 155,105 235,172 320,250 405,285 505,267 570,250" fill="none" stroke="#a44f4f" stroke-width="4"/><polyline points="80,87 155,104 235,129 320,160 405,192 505,174 570,155" fill="none" stroke="#4d6b61" stroke-width="4"/><polyline points="80,98 155,110 235,139 320,151 405,164 505,137 570,116" fill="none" stroke="#597d9c" stroke-width="4"/><polyline points="80,96 155,100 235,113 320,130 405,141 505,120 570,106" fill="none" stroke="#c89456" stroke-width="4"/><g font-size="13"><text x="430" y="281" fill="#a44f4f">银行/地产</text><text x="430" y="188" fill="#4d6b61">TOPIX</text><text x="430" y="158" fill="#597d9c">出口制造</text><text x="430" y="136" fill="#c89456">内需服务</text></g></g><g transform="translate(730 120)"><rect width="405" height="386" rx="16" fill="#fff" stroke="#e2e2e2"/><text x="26" y="42" font-size="16" font-weight="700">对中国权益投资的可迁移经验</text><g font-size="14"><circle cx="37" cy="93" r="6" fill="#a44f4f"/><text x="54" y="98">地产/银行的β不等于全部市场的β</text><circle cx="37" cy="153" r="6" fill="#4d6b61"/><text x="54" y="158">盈利低谷期，现金流与分红成为锚</text><circle cx="37" cy="213" r="6" fill="#597d9c"/><text x="54" y="218">出口与生产率可制造相对收益</text><circle cx="37" cy="273" r="6" fill="#c89456"/><text x="54" y="278">服务消费受收入与安全网制约</text></g><line x1="25" y1="315" x2="380" y2="315" stroke="#ddd"/><text x="26" y="346" font-size="13" fill="#777">核心判断</text><text x="26" y="371" font-size="14" font-weight="700">先做行业排序，再做指数判断。</text></g><text x="62" y="562" font-size="12" fill="#777">资料：BOJ 关于 TOPIX 与地价的历史资料；行业路径为作者基于机制的标准化示意，未声称为官方行业指数。</text></g></svg>
