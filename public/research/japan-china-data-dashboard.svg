<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" role="img" aria-labelledby="t d">
<title id="t">日本泡沫后与中国房地产调整数据仪表板</title><desc id="d">四幅原创图展示日本增长、资产与就业，以及中国房地产开发投资和人口变化</desc>
<rect width="1200" height="820" rx="24" fill="#fafafa"/>
<g font-family="system-ui,-apple-system,'Noto Sans SC',sans-serif">
<text x="54" y="55" font-size="25" font-weight="750" fill="#111">四组压力信号，不是同一条时间线</text>
<text x="54" y="82" font-size="14" fill="#777">日本：泡沫前后结构变化　·　中国：2021 年以来的地产与人口调整</text>
<g transform="translate(54 118)"><rect width="520" height="276" rx="15" fill="#fff" stroke="#e4e4e4"/><text x="24" y="36" font-size="16" font-weight="700">日本实质 GDP 年均增速</text><text x="24" y="58" font-size="12" fill="#888">1980s vs 1990s</text><line x1="56" y1="225" x2="478" y2="225" stroke="#ddd"/><rect x="112" y="75" width="105" height="150" rx="7" fill="#4d6b61"/><rect x="315" y="174" width="105" height="51" rx="7" fill="#a44f4f"/><g text-anchor="middle"><text x="164" y="64" font-size="25" font-weight="750">4.4%</text><text x="367" y="163" font-size="25" font-weight="750">1.5%</text><text x="164" y="250" font-size="13" fill="#666">1980 年代</text><text x="367" y="250" font-size="13" fill="#666">1990 年代</text></g></g>
<g transform="translate(626 118)"><rect width="520" height="276" rx="15" fill="#fff" stroke="#e4e4e4"/><text x="24" y="36" font-size="16" font-weight="700">日本社会风险的“慢变量”</text><text x="24" y="58" font-size="12" fill="#888">失业率与非正规就业占比，不同年份</text><g transform="translate(40 86)"><text x="0" y="18" font-size="13">失业率</text><rect x="120" y="0" width="99" height="26" rx="5" fill="#dfe9e5"/><rect x="120" y="0" width="210" height="26" rx="5" fill="#4d6b61" opacity=".72"/><text x="340" y="19" font-size="13" font-weight="700">2.1% → 5.4%</text><text x="0" y="88" font-size="13">非正规就业</text><rect x="120" y="70" width="157" height="26" rx="5" fill="#ead5d5"/><rect x="120" y="70" width="265" height="26" rx="5" fill="#a44f4f" opacity=".72"/><text x="395" y="89" font-size="13" font-weight="700">约 20% → 34%</text><text x="120" y="136" font-size="12" fill="#888">浅色：约 1990　深色：2002 / 2010</text></g></g>
<g transform="translate(54 430)"><rect width="520" height="304" rx="15" fill="#fff" stroke="#e4e4e4"/><text x="24" y="36" font-size="16" font-weight="700">中国房地产开发投资</text><text x="24" y="58" font-size="12" fill="#888">万亿元，国家统计局名义值</text><line x1="52" y1="250" x2="482" y2="250" stroke="#ddd"/><g fill="#a44f4f"><rect x="69" y="91" width="56" height="159" rx="5"/><rect x="152" y="107" width="56" height="143" rx="5" opacity=".9"/><rect x="235" y="131" width="56" height="119" rx="5" opacity=".8"/><rect x="318" y="142" width="56" height="108" rx="5" opacity=".7"/><rect x="401" y="161" width="56" height="89" rx="5" opacity=".6"/></g><g font-size="12" text-anchor="middle"><text x="97" y="82">14.76</text><text x="180" y="98">13.29</text><text x="263" y="122">11.09</text><text x="346" y="133">10.03</text><text x="429" y="152">8.28</text><g fill="#777"><text x="97" y="273">2021</text><text x="180" y="273">2022</text><text x="263" y="273">2023</text><text x="346" y="273">2024</text><text x="429" y="273">2025</text></g></g></g>
<g transform="translate(626 430)"><rect width="520" height="304" rx="15" fill="#fff" stroke="#e4e4e4"/><text x="24" y="36" font-size="16" font-weight="700">中国年末总人口</text><text x="24" y="58" font-size="12" fill="#888">亿人；纵轴截断，强调变化而非规模</text><line x1="52" y1="250" x2="482" y2="250" stroke="#ddd"/><polyline points="70,92 167,108 264,152 361,176 458,231" fill="none" stroke="#4d6b61" stroke-width="4"/><g fill="#4d6b61"><circle cx="70" cy="92" r="6"/><circle cx="167" cy="108" r="6"/><circle cx="264" cy="152" r="6"/><circle cx="361" cy="176" r="6"/><circle cx="458" cy="231" r="6"/></g><g font-size="12" text-anchor="middle"><text x="70" y="78">14.126</text><text x="167" y="94">14.118</text><text x="264" y="138">14.097</text><text x="361" y="162">14.083</text><text x="458" y="217">14.049</text><g fill="#777"><text x="70" y="273">2021</text><text x="167" y="273">2022</text><text x="264" y="273">2023</text><text x="361" y="273">2024</text><text x="458" y="273">2025</text></g></g></g>
<text x="54" y="779" font-size="12" fill="#777">来源：日本银行、OECD、日本统计局；中国国家统计局历年统计公报。图表为本文作者重绘；不同面板不可直接比较幅度。</text>
</g></svg>
