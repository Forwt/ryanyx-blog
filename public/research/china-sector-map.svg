<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="t d"><title id="t">中国行业权益地图</title><desc id="d">以地产敏感度和盈利可见度定位行业</desc><rect width="1200" height="680" rx="24" fill="#fafafa"/><g font-family="system-ui,-apple-system,'Noto Sans SC',sans-serif"><text x="58" y="52" font-size="24" font-weight="750">中国权益：从“宏观β”切换到“现金流与政策β”</text><text x="58" y="80" font-size="14" fill="#777">横轴：房地产/内需敏感度　纵轴：盈利可见度与现金流质量　气泡大小：结构性重要性（作者分类）</text><g transform="translate(98 120)"><rect width="760" height="455" rx="16" fill="#fff" stroke="#e2e2e2"/><line x1="70" y1="390" x2="700" y2="390" stroke="#aaa"/><line x1="70" y1="40" x2="70" y2="390" stroke="#aaa"/><line x1="385" y1="40" x2="385" y2="390" stroke="#ddd" stroke-dasharray="6 6"/><line x1="70" y1="215" x2="700" y2="215" stroke="#ddd" stroke-dasharray="6 6"/><text x="345" y="428" font-size="13" fill="#777">地产/居民周期敏感度 →</text><text x="-5" y="40" font-size="13" fill="#777" transform="rotate(-90 -5 40)">盈利可见度 →</text><g fill="#a44f4f" opacity=".82"><circle cx="175" cy="315" r="42"/><circle cx="245" cy="345" r="30"/></g><g fill="#4d6b61" opacity=".82"><circle cx="600" cy="107" r="46"/><circle cx="520" cy="160" r="38"/><circle cx="660" cy="185" r="31"/></g><g fill="#597d9c" opacity=".82"><circle cx="455" cy="250" r="35"/><circle cx="340" cy="285" r="28"/></g><g fill="#c89456" opacity=".82"><circle cx="610" cy="285" r="30"/><circle cx="510" cy="325" r="24"/></g><g font-size="14" font-weight="700" text-anchor="middle" fill="#fff"><text x="175" y="320">地产</text><text x="245" y="350">银行</text><text x="600" y="112">电网/设备</text><text x="520" y="165">电子/算力</text><text x="660" y="190">军工/船舶</text><text x="455" y="255">汽车</text><text x="340" y="290">化工</text><text x="610" y="290">医药</text><text x="510" y="330">大众消费</text></g><g font-size="12" fill="#777"><text x="90" y="370">高地产暴露</text><text x="605" y="370">低地产暴露</text><text x="85" y="66">高可见度</text><text x="85" y="385">低可见度</text></g></g><g transform="translate(910 120)"><rect width="230" height="455" rx="16" fill="#fff" stroke="#e2e2e2"/><text x="24" y="42" font-size="16" font-weight="700">读图规则</text><text x="24" y="83" font-size="13" fill="#777">优先研究</text><text x="24" y="108" font-size="14" font-weight="700">右上：现金流+政策</text><text x="24" y="143" font-size="13" fill="#777">等待确认</text><text x="24" y="168" font-size="14" font-weight="700">中部：盈利弹性</text><text x="24" y="203" font-size="13" fill="#777">避免把便宜当安全</text><text x="24" y="228" font-size="14" font-weight="700">左下：高杠杆+低可见度</text><line x1="24" y1="265" x2="205" y2="265" stroke="#ddd"/><text x="24" y="300" font-size="13" fill="#777">数据锚点</text><text x="24" y="330" font-size="13">2025 工业利润</text><text x="24" y="352" font-size="20" font-weight="750" fill="#4d6b61">+0.6%</text><text x="24" y="385" font-size="13">高技术制造</text><text x="24" y="407" font-size="20" font-weight="750" fill="#4d6b61">+13.3%</text><text x="24" y="440" font-size="12" fill="#777">NBS；圆点分类为作者框架</text></g></g></svg>
