<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="t d"><title id="t">中国权益投资三情景矩阵</title><desc id="d">政策处理速度与国内需求强弱的行业收益方向矩阵</desc><rect width="1200" height="600" rx="24" fill="#fafafa"/><g font-family="system-ui,-apple-system,'Noto Sans SC',sans-serif"><text x="58" y="53" font-size="24" font-weight="750">三种宏观路径，对应三种权益组合</text><text x="58" y="80" font-size="14" fill="#777">横轴：资产负债表修复速度　纵轴：内需/价格回升强度；这是情景分析，不是目标价</text><g transform="translate(90 125)"><rect width="720" height="380" rx="16" fill="#fff" stroke="#e2e2e2"/><line x1="80" y1="310" x2="650" y2="310" stroke="#aaa"/><line x1="80" y1="40" x2="80" y2="310" stroke="#aaa"/><line x1="365" y1="40" x2="365" y2="310" stroke="#ddd" stroke-dasharray="6 6"/><line x1="80" y1="175" x2="650" y2="175" stroke="#ddd" stroke-dasharray="6 6"/><text x="270" y="350" font-size="13" fill="#777">修复慢 → 修复快</text><text x="-10" y="55" font-size="13" fill="#777" transform="rotate(-90 -10 55)">内需强 →</text><g fill="#f0dede" stroke="#b36e6e"><circle cx="195" cy="255" r="43"/><circle cx="300" cy="215" r="30"/></g><g fill="#dceae5" stroke="#4d6b61"><circle cx="550" cy="110" r="50"/><circle cx="455" cy="160" r="34"/></g><g fill="#e8e1d1" stroke="#c89456"><circle cx="525" cy="260" r="42"/></g><g text-anchor="middle" font-size="14" font-weight="700"><text x="195" y="251">延宕</text><text x="195" y="270" font-size="12" font-weight="400">现金/高股息</text><text x="300" y="211">地产反弹</text><text x="300" y="230" font-size="12" font-weight="400">高β但脆弱</text><text x="550" y="106">再平衡</text><text x="550" y="125" font-size="12" font-weight="400">消费+服务</text><text x="455" y="156">质量成长</text><text x="455" y="175" font-size="12" font-weight="400">盈利复评</text><text x="525" y="256">外需托底</text><text x="525" y="275" font-size="12" font-weight="400">制造/出口</text></g></g><g transform="translate(870 125)"><rect width="270" height="380" rx="16" fill="#fff" stroke="#e2e2e2"/><text x="24" y="44" font-size="16" font-weight="700">组合动作</text><text x="24" y="90" font-size="14" font-weight="700" fill="#a44f4f">延宕</text><text x="24" y="113" font-size="13" fill="#777">控制地产链暴露</text><text x="24" y="155" font-size="14" font-weight="700" fill="#4d6b61">再平衡</text><text x="24" y="178" font-size="13" fill="#777">提高消费与服务权重</text><text x="24" y="220" font-size="14" font-weight="700" fill="#c89456">外需托底</text><text x="24" y="243" font-size="13" fill="#777">检查价格战和贸易风险</text><line x1="24" y1="280" x2="240" y2="280" stroke="#ddd"/><text x="24" y="315" font-size="13" fill="#777">仓位纪律</text><text x="24" y="342" font-size="13">不把宏观判断变成</text><text x="24" y="364" font-size="13" font-weight="700">单一行业押注</text></g></g></svg>
